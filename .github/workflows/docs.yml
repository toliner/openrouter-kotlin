name: Deploy Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: true

      - name: Generate Dokka API docs
        run: ./gradlew dokkaGeneratePublicationHtml

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build English docs
        run: mkdocs build -f mkdocs.en.yml

      - name: Build Japanese docs
        run: mkdocs build -f mkdocs.ja.yml

      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp -r site/en _site/en
          cp -r site/ja _site/ja
          cp -r build/dokka/html _site/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
