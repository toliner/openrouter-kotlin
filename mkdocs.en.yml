site_name: openrouter-kotlin
site_url: https://toliner.github.io/openrouter-kotlin/en/
site_description: Kotlin client library for the OpenRouter API
site_author: toliner
repo_url: https://github.com/toliner/openrouter-kotlin
repo_name: toliner/openrouter-kotlin

docs_dir: docs/en
site_dir: site/en

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  alternate:
    - name: English
      link: /openrouter-kotlin/en/
      lang: en
    - name: 日本語
      link: /openrouter-kotlin/ja/
      lang: ja

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Guide:
      - Chat Completions: guide/chat-completions.md
      - Streaming: guide/streaming.md
      - DSL Builders: guide/dsl-builders.md
      - Error Handling: guide/error-handling.md
      - Models & Providers: guide/models-providers.md
  - API Reference: api-reference.md
